name: Build iOS IPA (Unsigned)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-15

    env:
      SCHEME: purekfd
      PROJECT: PureKFD.xcodeproj
      CONFIGURATION: Release
      ARCHIVE_PATH: build/purekfd.xcarchive
      EXPORT_PATH: build/ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Build app without signing
        run: |
          xcodebuild \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          mkdir -p build/ipa/Payload
          cp -R "$APP_PATH" build/ipa/Payload/

          cd build/ipa
          zip -r PureKFD-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PureKFD-unsigned-ipa
          path: build/ipa/PureKFD-unsigned.ipa
